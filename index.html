<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div id="app">
      <h1>💸Expense Tracker</h1>

      <!-- Balance Section -->
      <div id="balance">
        <h3>Your Balance:</h3>
        <h2 id="balance-amount">₹0.00</h2>
      </div>

      <!-- Transaction Form -->
      <form id="transaction-form">
        <input type="text" id="text" placeholder="Enter description" required />
        <label for="amount">Amount (negative: expense, positive: income)</label>
        <input
          type="number"
          id="amount"
          placeholder="Enter amount..."
          required
        />

        <div class="button-group">
          <button type="submit" class="btn-add">Add Transaction</button>
          <button type="button" id="clear-transactions" class="btn-clear">
        Clear Transactions
      </button>
        </div>
      </form>

      

      <!-- Transaction List -->
      <h3>History</h3>
      <div id="transaction-list">
        <ul id="transactions" class="list"></ul>
      </div>

      <div class="summary">
        <p>Income: <span id="income">0.00</span></p>
        <p>Expense: <span id="expense">0.00</span></p>
      </div>

      <div class="chart-container">
        <canvas id="expenseChart"></canvas>
      </div>

      <script src="script.js" defer></script>
    </div>
  </body>
</html>
